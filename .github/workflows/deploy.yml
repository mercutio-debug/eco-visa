name: Pubblica build per Hostinger

# Builda il sito statico e pubblica il risultato (cartella out/) sul branch
# "hostinger-deploy". Hostinger è collegato a quel branch tramite la sua
# integrazione Git nativa: ad ogni aggiornamento del branch, Hostinger
# scarica i file GIA' COMPILATI in public_html. Così ogni push su main
# aggiorna automaticamente il sito online.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build (export statico, percorsi root per Hostinger)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Pubblica out/ sul branch hostinger-deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: hostinger-deploy
          # NIENTE force_orphan: la storia del branch resta continua, così
          # l'auto-deploy di Hostinger riesce a fare pull/fast-forward pulito.
          commit_message: "Deploy sito compilato per Hostinger"
