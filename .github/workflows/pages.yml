name: Preview su GitHub Pages

# Pubblica una preview del sito su GitHub Pages ad ogni push su main.
# URL: https://mercutio-debug.github.io/eco-visa/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy sovrapposti.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build per GitHub Pages (con basePath /eco-visa)
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Evita l'elaborazione Jekyll (serve la cartella _next)
        run: touch out/.nojekyll

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Carica l'artefatto del sito
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
